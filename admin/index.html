<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — L&S</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="/style.css">
<style>
.admin-wrap { max-width: 1000px; margin: 0 auto; padding: 0 var(--pad) 100px; }

.login-box { max-width: 400px; margin: 40px auto; text-align: center; }

.login-box input {
  width: 100%;
  background: transparent;
  border: 1px solid var(--brass-line);
  font-family: var(--sans);
  font-size: 16px;
  padding: 14px 16px;
  outline: none;
  text-align: center;
  letter-spacing: .08em;
  color: var(--ink);
}

.login-box input:focus { border-color: var(--brass); }

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 14px;
  margin: 36px 0;
}

.stat {
  border: 1px solid var(--brass-line);
  padding: 22px 16px;
  text-align: center;
}

.stat b {
  display: block;
  font-family: var(--serif);
  font-size: 38px;
  font-weight: 400;
  line-height: 1;
}

.stat span {
  font-size: 9.5px;
  letter-spacing: .26em;
  text-transform: uppercase;
  color: var(--brass);
  display: block;
  margin-top: 10px;
}

.rsvp-card {
  border: 1px solid var(--brass-line);
  padding: 22px 26px;
  margin-bottom: 14px;
}

.rsvp-card .top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 14px;
  flex-wrap: wrap;
}

.rsvp-card h3 { font-family: var(--serif); font-weight: 400; font-size: 22px; }

.badge {
  font-size: 9.5px;
  letter-spacing: .22em;
  text-transform: uppercase;
  padding: 6px 12px;
  border: 1px solid currentColor;
}

.badge.whole_day { color: #4a7a4a; }
.badge.evening_only { color: var(--brass); }
.badge.declines { color: #a05252; }

.rsvp-card .meta { font-size: 13px; color: var(--ink-dim); margin-top: 6px; }
.rsvp-card ul { margin-top: 12px; }
.rsvp-card li { font-size: 14px; padding: 4px 0; border-top: 1px dashed var(--brass-faint); }
.rsvp-card li b { font-weight: 400; }
.rsvp-card li span { color: var(--ink-dim); }
.rsvp-card .note { font-size: 13.5px; color: var(--ink-dim); font-style: italic; margin-top: 10px; }

.toolbar { display: flex; gap: 12px; justify-content: flex-end; margin-bottom: 20px; flex-wrap: wrap; }
.toolbar button {
  background: none;
  border: 1px solid var(--brass-line);
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: .24em;
  text-transform: uppercase;
  padding: 10px 18px;
  cursor: pointer;
  color: var(--ink);
}
.toolbar button:hover { border-color: var(--brass); color: var(--brass); }

#err { color: #a05252; font-size: 14px; text-align: center; margin-top: 14px; min-height: 18px; }
</style>
</head>
<body>

<header class="page-head">
  <span class="eyebrow">Private</span>
  <h1 class="page-title">RSVP <em>Admin</em></h1>
  <div class="rule-v" aria-hidden="true"></div>
</header>

<div class="admin-wrap">

  <div class="login-box" id="login">
    <p style="font-size:14px;color:var(--ink-dim);margin-bottom:18px;">Enter the admin password to view responses.</p>
    <input type="password" id="pw" placeholder="Password" autocomplete="current-password">
    <button class="btn" id="go" style="width:100%;margin-top:16px;border:none;cursor:pointer;">View responses</button>
    <p id="err"></p>
  </div>

  <div id="dash" style="display:none;">
    <div class="stats" id="stats"></div>
    <div class="toolbar">
      <button id="refresh">Refresh</button>
      <button id="csv">Download CSV</button>
    </div>
    <div id="cards"></div>
  </div>

</div>

<script>
(function(){
  var SUPABASE_URL = 'https://uvvtdqltmdzbwchbtvbj.supabase.co';
  var ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2dnRkcWx0bWR6YndjaGJ0dmJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MTc1NDgsImV4cCI6MjA5MTk5MzU0OH0.qMHaphQXBRIZ2eZgyYFNEgRszRRM4V5jRSy3kPzLi5c';
  var data = [];
  var pw = '';

  var LABELS = { whole_day: 'Whole day', evening_only: 'Evening only', declines: 'Declines' };

  async function load() {
    var res = await fetch(SUPABASE_URL + '/rest/v1/rpc/get_wedding_rsvps', {
      method: 'POST',
      headers: {
        'apikey': ANON_KEY,
        'Authorization': 'Bearer ' + ANON_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ p_password: pw })
    });
    if (!res.ok) throw new Error('auth');
    return res.json();
  }

  function render() {
    var dayGuests = 0, eveGuests = 0, declines = 0;
    data.forEach(function(r){
      var n = (r.party_members || []).length;
      if (r.attending === 'whole_day') dayGuests += n;
      else if (r.attending === 'evening_only') eveGuests += n;
      else declines++;
    });

    document.getElementById('stats').innerHTML =
      '<div class="stat"><b>' + data.length + '</b><span>Responses</span></div>' +
      '<div class="stat"><b>' + dayGuests + '</b><span>Day guests</span></div>' +
      '<div class="stat"><b>' + eveGuests + '</b><span>Evening guests</span></div>' +
      '<div class="stat"><b>' + declines + '</b><span>Declines</span></div>';

    var dietary = [];
    var html = data.map(function(r){
      var members = (r.party_members || []).map(function(m){
        if (m.dietary) dietary.push(m.name + ': ' + m.dietary);
        return '<li><b>' + esc(m.name) + '</b>' + (m.dietary ? ' — <span>' + esc(m.dietary) + '</span>' : '') + '</li>';
      }).join('');
      return '<div class="rsvp-card">' +
        '<div class="top"><h3>' + esc(r.contact_name) + '</h3>' +
        '<span class="badge ' + r.attending + '">' + LABELS[r.attending] + '</span></div>' +
        '<p class="meta">' + esc(r.email) + (r.phone ? ' · ' + esc(r.phone) : '') +
        ' · ' + new Date(r.created_at).toLocaleDateString('en-GB', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) + '</p>' +
        (members ? '<ul>' + members + '</ul>' : '') +
        (r.song_request ? '<p class="note">♪ ' + esc(r.song_request) + '</p>' : '') +
        (r.message ? '<p class="note">“' + esc(r.message) + '”</p>' : '') +
        '</div>';
    }).join('');

    document.getElementById('cards').innerHTML = html || '<p style="text-align:center;color:var(--ink-dim);">No responses yet.</p>';
  }

  function esc(s){ return String(s||'').replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

  document.getElementById('go').onclick = async function(){
    pw = document.getElementById('pw').value;
    document.getElementById('err').textContent = '';
    try {
      data = await load();
      document.getElementById('login').style.display = 'none';
      document.getElementById('dash').style.display = 'block';
      render();
    } catch(e) {
      document.getElementById('err').textContent = 'Wrong password.';
    }
  };

  document.getElementById('pw').addEventListener('keydown', function(e){
    if (e.key === 'Enter') document.getElementById('go').click();
  });

  document.getElementById('refresh').onclick = async function(){
    data = await load(); render();
  };

  document.getElementById('csv').onclick = function(){
    var rows = [['Date','Contact','Email','Phone','Attending','Party','Dietary','Song','Message']];
    data.forEach(function(r){
      rows.push([
        new Date(r.created_at).toISOString().slice(0,16).replace('T',' '),
        r.contact_name, r.email, r.phone || '',
        LABELS[r.attending],
        (r.party_members||[]).map(function(m){return m.name;}).join('; '),
        (r.party_members||[]).filter(function(m){return m.dietary;}).map(function(m){return m.name+': '+m.dietary;}).join('; '),
        r.song_request || '', r.message || ''
      ]);
    });
    var csv = rows.map(function(r){
      return r.map(function(c){ return '"' + String(c).replace(/"/g,'""') + '"'; }).join(',');
    }).join('\n');
    var a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    a.download = 'wedding-rsvps.csv';
    a.click();
  };
})();
</script>

</body>
</html>
