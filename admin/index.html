<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — L&S</title>
<link rel="icon" type="image/png" href="/favicon.png">
<meta property="og:title" content="Lucie & Simon — 26 June 2027">
<meta property="og:description" content="Join us as we celebrate our wedding. St Mary's Church, Honley & Manor House, Lindley, West Yorkshire.">
<meta property="og:image" content="https://lucieandsimon.wedding/images/og-share.jpg">
<meta property="og:url" content="https://lucieandsimon.wedding">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="/style.css">
<style>
.admin-wrap { max-width: 1000px; margin: 0 auto; padding: 0 var(--pad) 100px; }

.login-box { max-width: 400px; margin: 40px auto; text-align: center; }

.login-box input {
  width: 100%;
  background: transparent;
  border: 1px solid var(--brass-line);
  font-family: var(--sans);
  font-size: 16px;
  padding: 14px 16px;
  outline: none;
  text-align: center;
  letter-spacing: .08em;
  color: var(--ink);
}

.login-box input:focus { border-color: var(--brass); }

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 14px;
  margin: 36px 0;
}

.stat {
  border: 1px solid var(--brass-line);
  padding: 22px 16px;
  text-align: center;
}

.stat b {
  display: block;
  font-family: var(--serif);
  font-size: 38px;
  font-weight: 400;
  line-height: 1;
}

.stat span {
  font-size: 9.5px;
  letter-spacing: .26em;
  text-transform: uppercase;
  color: var(--brass);
  display: block;
  margin-top: 10px;
}

.rsvp-card {
  border: 1px solid var(--brass-line);
  padding: 22px 26px;
  margin-bottom: 14px;
}

.rsvp-card .top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 14px;
  flex-wrap: wrap;
}

.rsvp-card h3 { font-family: var(--serif); font-weight: 400; font-size: 22px; }

.badge {
  font-size: 9.5px;
  letter-spacing: .22em;
  text-transform: uppercase;
  padding: 6px 12px;
  border: 1px solid currentColor;
}

.badge.whole_day { color: #4a7a4a; }
.badge.evening_only { color: var(--brass); }
.badge.declines { color: #a05252; }

.rsvp-card .meta { font-size: 13px; color: var(--ink-dim); margin-top: 6px; }
.rsvp-card ul { margin-top: 12px; }
.rsvp-card li { font-size: 14px; padding: 4px 0; border-top: 1px dashed var(--brass-faint); }
.rsvp-card li b { font-weight: 400; }
.rsvp-card li span { color: var(--ink-dim); }
.rsvp-card .note { font-size: 13.5px; color: var(--ink-dim); font-style: italic; margin-top: 10px; }

.toolbar { display: flex; gap: 12px; justify-content: flex-end; margin-bottom: 20px; flex-wrap: wrap; }
.toolbar button {
  background: none;
  border: 1px solid var(--brass-line);
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: .24em;
  text-transform: uppercase;
  padding: 10px 18px;
  cursor: pointer;
  color: var(--ink);
}
.toolbar button:hover { border-color: var(--brass); color: var(--brass); }

#err { color: #a05252; font-size: 14px; text-align: center; margin-top: 14px; min-height: 18px; }
</style>
</head>
<body>

<header class="page-head">
  <span class="eyebrow">Private</span>
  <h1 class="page-title">RSVP <em>Admin</em></h1>
  <div class="rule-v" aria-hidden="true"></div>
</header>

<div class="admin-wrap">

  <div class="login-box" id="login">
    <p style="font-size:14px;color:var(--ink-dim);margin-bottom:18px;">Enter the admin password to view responses.</p>
    <input type="password" id="pw" placeholder="Password" autocomplete="current-password">
    <button class="btn" id="go" style="width:100%;margin-top:16px;border:none;cursor:pointer;">View responses</button>
    <p id="err"></p>
  </div>

  <div id="dash" style="display:none;">
    <div class="stats" id="stats"></div>
    <div class="toolbar" style="justify-content:center;margin-bottom:26px;">
      <button class="tab-btn" data-tab="rsvps" style="border-color:var(--brass);color:var(--brass);">RSVPs</button>
      <button class="tab-btn" data-tab="guests">Guest list</button>
      <button class="tab-btn" data-tab="photos">Photo wall</button>
      <button class="tab-btn" data-tab="gbook">Guestbook</button>
    </div>
    <div id="tab-rsvps">
      <div class="toolbar">
        <button id="refresh">Refresh</button>
        <button id="csv">Download CSV</button>
      </div>
      <div id="cards"></div>
    </div>
    <div id="tab-guests" style="display:none;">
      <div class="toolbar">
        <button id="g-all" style="border-color:var(--brass);color:var(--brass);">All</button>
        <button id="g-pending">Not yet responded</button>
      </div>
      <div id="guest-rows"></div>
    </div>
    <div id="tab-gbook" style="display:none;">
      <p style="font-size:13px;color:var(--ink-dim);text-align:center;margin-bottom:20px;">Tap any note to remove it from the wall.</p>
      <div id="gb-admin"></div>
    </div>
    <div id="tab-photos" style="display:none;">
      <p style="font-size:13px;color:var(--ink-dim);text-align:center;margin-bottom:20px;">Tap any photo to remove it from the wall. Deletion is immediate and permanent.</p>
      <div id="mod-gallery" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;"></div>
    </div>
  </div>

</div>

<script>
(function(){
  var SUPABASE_URL = 'https://uvvtdqltmdzbwchbtvbj.supabase.co';
  var ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2dnRkcWx0bWR6YndjaGJ0dmJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MTc1NDgsImV4cCI6MjA5MTk5MzU0OH0.qMHaphQXBRIZ2eZgyYFNEgRszRRM4V5jRSy3kPzLi5c';
  var data = [];
  var pw = '';

  var LABELS = { whole_day: 'Whole day', evening_only: 'Evening only', declines: 'Declines' };

  async function load() {
    var res = await fetch(SUPABASE_URL + '/rest/v1/rpc/get_wedding_rsvps', {
      method: 'POST',
      headers: {
        'apikey': ANON_KEY,
        'Authorization': 'Bearer ' + ANON_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ p_password: pw })
    });
    if (!res.ok) throw new Error('auth');
    return res.json();
  }

  function render() {
    var dayGuests = 0, eveGuests = 0, declines = 0, seats = 0;
    data.forEach(function(r){
      var n = (r.party_members || []).length;
      seats += (r.transport_seats || 0);
      if (r.attending === 'whole_day') dayGuests += n;
      else if (r.attending === 'evening_only') eveGuests += n;
      else declines++;
    });

    document.getElementById('stats').innerHTML =
      '<div class="stat"><b>' + data.length + '</b><span>Responses</span></div>' +
      '<div class="stat"><b>' + dayGuests + '</b><span>Day guests</span></div>' +
      '<div class="stat"><b>' + eveGuests + '</b><span>Evening guests</span></div>' +
      '<div class="stat"><b>' + declines + '</b><span>Declines</span></div>' +
      '<div class="stat"><b>' + seats + '</b><span>Bus seats</span></div>';

    var dietary = [];
    var html = data.map(function(r){
      var members = (r.party_members || []).map(function(m){
        if (m.dietary) dietary.push(m.name + ': ' + m.dietary);
        return '<li><b>' + esc(m.name) + '</b>' + (m.dietary ? ' — <span>' + esc(m.dietary) + '</span>' : '') + '</li>';
      }).join('');
      return '<div class="rsvp-card">' +
        '<div class="top"><h3>' + esc(r.contact_name) + '</h3>' +
        '<span class="badge ' + r.attending + '">' + LABELS[r.attending] + '</span></div>' +
        '<p class="meta">' + esc(r.email) + (r.phone ? ' · ' + esc(r.phone) : '') +
        ' · ' + new Date(r.created_at).toLocaleDateString('en-GB', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) + '</p>' +
        (members ? '<ul>' + members + '</ul>' : '') +
        (r.transport_seats ? '<p class="note">🚌 ' + r.transport_seats + ' transport seat' + (r.transport_seats === 1 ? '' : 's') + ' requested</p>' : '') +
        (r.song_request ? '<p class="note">♪ ' + esc(r.song_request) + '</p>' : '') +
        (r.message ? '<p class="note">“' + esc(r.message) + '”</p>' : '') +
        '</div>';
    }).join('');

    document.getElementById('cards').innerHTML = html || '<p style="text-align:center;color:var(--ink-dim);">No responses yet.</p>';
  }

  function esc(s){ return String(s||'').replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

  document.getElementById('go').onclick = async function(){
    pw = document.getElementById('pw').value;
    document.getElementById('err').textContent = '';
    try {
      data = await load();
      document.getElementById('login').style.display = 'none';
      document.getElementById('dash').style.display = 'block';
      render();
    } catch(e) {
      document.getElementById('err').textContent = 'Wrong password.';
    }
  };

  document.getElementById('pw').addEventListener('keydown', function(e){
    if (e.key === 'Enter') document.getElementById('go').click();
  });

  document.getElementById('refresh').onclick = async function(){
    data = await load(); render();
  };

  document.getElementById('csv').onclick = function(){
    var rows = [['Date','Contact','Email','Phone','Attending','Party','Dietary','Transport seats','Song','Message']];
    data.forEach(function(r){
      rows.push([
        new Date(r.created_at).toISOString().slice(0,16).replace('T',' '),
        r.contact_name, r.email, r.phone || '',
        LABELS[r.attending],
        (r.party_members||[]).map(function(m){return m.name;}).join('; '),
        (r.party_members||[]).filter(function(m){return m.dietary;}).map(function(m){return m.name+': '+m.dietary;}).join('; '),
        r.transport_seats || 0,
        r.song_request || '', r.message || ''
      ]);
    });
    var csv = rows.map(function(r){
      return r.map(function(c){ return '"' + String(c).replace(/"/g,'""') + '"'; }).join(',');
    }).join('\n');
    var a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    a.download = 'wedding-rsvps.csv';
    a.click();
  };

  // ── Tabs ──
  var tabs = document.querySelectorAll('.tab-btn');
  tabs.forEach(function(b){
    b.onclick = function(){
      tabs.forEach(function(x){ x.style.borderColor=''; x.style.color=''; });
      b.style.borderColor = 'var(--brass)'; b.style.color = 'var(--brass)';
      ['rsvps','guests','photos','gbook'].forEach(function(t){
        document.getElementById('tab-' + t).style.display = t === b.dataset.tab ? 'block' : 'none';
      });
      if (b.dataset.tab === 'guests') loadGuests();
      if (b.dataset.tab === 'photos') loadModGallery();
      if (b.dataset.tab === 'gbook') loadGuestbookAdmin();
    };
  });

  // ── Guest list ──
  var guestData = [], guestFilter = 'all';

  async function loadGuests() {
    var res = await fetch(SUPABASE_URL + '/rest/v1/rpc/get_guest_status', {
      method: 'POST',
      headers: { 'apikey': ANON_KEY, 'Authorization': 'Bearer ' + ANON_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ p_password: pw })
    });
    guestData = res.ok ? await res.json() : [];
    renderGuests();
  }

  function renderGuests() {
    var rows = guestFilter === 'pending' ? guestData.filter(function(g){ return !g.responded; }) : guestData;
    var pending = guestData.filter(function(g){ return !g.responded; }).length;
    var html = '<p style="font-size:13px;color:var(--ink-dim);text-align:center;margin-bottom:18px;">' +
      guestData.length + ' on the list · <strong style="color:var(--brass);">' + pending + ' not yet responded</strong></p>';
    var byGroup = {};
    rows.forEach(function(g){ (byGroup[g.guest_group || 'Other'] = byGroup[g.guest_group || 'Other'] || []).push(g); });
    Object.keys(byGroup).sort().forEach(function(grp){
      html += '<p style="font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--brass);padding:22px 0 10px;">' + esc(grp) + '</p>';
      html += byGroup[grp].map(function(g){
        var badge = g.responded
          ? '<span class="badge ' + (g.attending || 'whole_day') + '">' + (LABELS[g.attending] || 'Responded') + '</span>'
          : '<span class="badge" style="color:#999;">Awaiting</span>';
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 4px;border-bottom:1px solid var(--brass-faint);">' +
          '<span style="font-family:var(--serif);font-size:18px;">' + esc(g.first_name + ' ' + g.last_name) + '</span>' + badge + '</div>';
      }).join('');
    });
    document.getElementById('guest-rows').innerHTML = html;
  }

  document.getElementById('g-all').onclick = function(){
    guestFilter = 'all';
    this.style.borderColor='var(--brass)'; this.style.color='var(--brass)';
    document.getElementById('g-pending').style.borderColor=''; document.getElementById('g-pending').style.color='';
    renderGuests();
  };
  document.getElementById('g-pending').onclick = function(){
    guestFilter = 'pending';
    this.style.borderColor='var(--brass)'; this.style.color='var(--brass)';
    document.getElementById('g-all').style.borderColor=''; document.getElementById('g-all').style.color='';
    renderGuests();
  };

  // ── Guestbook moderation ──
  async function loadGuestbookAdmin() {
    var res = await fetch(SUPABASE_URL + '/rest/v1/rpc/get_guestbook', {
      method: 'POST', headers: { 'apikey': ANON_KEY, 'Authorization': 'Bearer ' + ANON_KEY, 'Content-Type': 'application/json' }, body: '{}'
    });
    var rows = res.ok ? await res.json() : [];
    var el = document.getElementById('gb-admin');
    if (!rows.length) { el.innerHTML = '<p style="text-align:center;color:var(--ink-dim);">No notes yet.</p>'; return; }
    el.innerHTML = rows.map(function(r){
      return '<div class="rsvp-card" style="cursor:pointer;" data-id="' + r.id + '">' +
        '<p style="font-family:var(--serif);font-style:italic;font-size:17px;">“' + esc(r.message) + '”</p>' +
        '<p class="meta">— ' + esc(r.author) + ' · ' + new Date(r.created_at).toLocaleDateString('en-GB') + '</p></div>';
    }).join('');
    el.querySelectorAll('.rsvp-card').forEach(function(card){
      card.onclick = async function(){
        if (!confirm('Remove this note from the guestbook permanently?')) return;
        var res = await fetch(SUPABASE_URL + '/rest/v1/rpc/delete_guestbook_entry', {
          method: 'POST',
          headers: { 'apikey': ANON_KEY, 'Authorization': 'Bearer ' + ANON_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ p_password: pw, p_id: card.dataset.id })
        });
        if (res.ok) card.remove();
      };
    });
  }

  // ── Photo moderation ──
  var STORAGE = SUPABASE_URL + '/storage/v1';

  async function loadModGallery() {
    var res = await fetch(STORAGE + '/object/list/wedding-photos', {
      method: 'POST',
      headers: { 'apikey': ANON_KEY, 'Authorization': 'Bearer ' + ANON_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ prefix: '', limit: 500, sortBy: { column: 'created_at', order: 'desc' } })
    });
    var items = res.ok ? await res.json() : [];
    items = items.filter(function(i){ return i.name && !i.name.startsWith('.'); });
    var g = document.getElementById('mod-gallery');
    if (!items.length) { g.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--ink-dim);">No photos on the wall yet.</p>'; return; }
    g.innerHTML = items.map(function(i){
      var src = STORAGE + '/object/public/wedding-photos/' + encodeURIComponent(i.name);
      return '<figure style="border:1px solid var(--brass-line);padding:5px;cursor:pointer;margin:0;" data-name="' + esc(i.name) + '">' +
        '<img src="' + src + '" loading="lazy" style="width:100%;height:140px;object-fit:cover;display:block;"></figure>';
    }).join('');
    g.querySelectorAll('figure').forEach(function(fig){
      fig.onclick = async function(){
        if (!confirm('Remove this photo from the wall permanently?')) return;
        var res = await fetch(SUPABASE_URL + '/rest/v1/rpc/delete_wedding_photo', {
          method: 'POST',
          headers: { 'apikey': ANON_KEY, 'Authorization': 'Bearer ' + ANON_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ p_password: pw, p_name: fig.dataset.name })
        });
        if (res.ok) fig.remove();
        else alert('Delete failed — try refreshing.');
      };
    });
  }
})();
</script>

</body>
</html>
