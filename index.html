<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ivory: #F7F4EC;         /* warm paper */
  --ink: #1D1B16;           /* soft black */
  --ink-dim: rgba(29,27,22,.55);
  --brass: #A8834B;         /* deeper brass for light bg contrast */
  --brass-line: rgba(168,131,75,.5);
  --serif: 'Bodoni Moda', 'Didot', serif;
  --sans: 'Jost', 'Futura', system-ui, sans-serif;
}

html, body { height: 100%; }

body {
  background: var(--ivory);
  color: var(--ink);
  font-family: var(--sans);
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }
::selection { background: var(--brass); color: var(--ivory); }

/* ── SOFT GLOW ── */
.glow {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 55% 44% at 50% 42%, rgba(168,131,75,.09) 0%, rgba(168,131,75,.03) 45%, transparent 72%);
}

/* ── FRAME ── */
.frame {
  position: fixed;
  inset: 14px;
  border: 1px solid var(--brass-line);
  pointer-events: none;
  z-index: 50;
}

.frame::before, .frame::after {
  content: '';
  position: absolute;
  width: 9px; height: 9px;
  border: 1px solid var(--brass);
}
.frame::before { top: -5px; left: -5px; border-right: none; border-bottom: none; }
.frame::after { bottom: -5px; right: -5px; border-left: none; border-top: none; }

/* ── LAYOUT ── */
.page {
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: clamp(48px, 8vh, 96px) 28px;
  position: relative;
  z-index: 1;
}

.fade {
  opacity: 0;
  transform: translateY(14px);
  animation: rise 1.1s cubic-bezier(.2,.6,.2,1) forwards;
}

@keyframes rise { to { opacity: 1; transform: none; } }

@media (prefers-reduced-motion: reduce) {
  .fade { animation: none !important; opacity: 1 !important; transform: none !important; }
}

.eyebrow {
  font-size: clamp(10px, 1.2vw, 12px);
  font-weight: 400;
  letter-spacing: .55em;
  text-transform: uppercase;
  color: var(--brass);
  margin-bottom: clamp(28px, 5vh, 48px);
  animation-delay: .15s;
}

.names {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(56px, 11vw, 150px);
  line-height: 1.02;
  letter-spacing: .01em;
  animation-delay: .35s;
}

.names .amp {
  display: block;
  font-style: italic;
  font-size: .38em;
  color: var(--brass);
  padding: .18em 0;
}

.rule {
  width: 1px;
  height: clamp(32px, 6vh, 56px);
  background: linear-gradient(to bottom, transparent, var(--brass), transparent);
  margin: clamp(28px, 5vh, 44px) 0;
  animation-delay: .6s;
}

.when {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(19px, 2.6vw, 28px);
  font-weight: 400;
  animation-delay: .75s;
}

.where {
  font-size: clamp(11px, 1.3vw, 13px);
  font-weight: 400;
  letter-spacing: .35em;
  text-transform: uppercase;
  color: var(--ink-dim);
  margin-top: 14px;
  animation-delay: .85s;
}

/* ── COUNTDOWN ── */
.count {
  display: flex;
  gap: clamp(22px, 5vw, 56px);
  margin: clamp(36px, 6vh, 60px) 0;
  animation-delay: 1s;
}

.count div { min-width: 54px; }

.count b {
  display: block;
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(30px, 4.6vw, 52px);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.count span {
  display: block;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: var(--brass);
  margin-top: 10px;
}

/* ── RSVP ── */
.rsvp {
  display: inline-block;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: .4em;
  text-transform: uppercase;
  color: var(--ivory);
  background: var(--ink);
  padding: 18px 54px 17px 58px;
  transition: background .25s, box-shadow .25s;
  animation-delay: 1.15s;
}

.rsvp:hover, .rsvp:focus-visible {
  background: var(--brass);
  box-shadow: 0 10px 34px rgba(168,131,75,.35);
}

a:focus-visible { outline: 1.5px solid var(--brass); outline-offset: 4px; }

/* ── TOP NAV ── */
.topnav {
  position: fixed;
  top: 15px; left: 15px; right: 15px;
  z-index: 60;
  display: flex;
  justify-content: center;
  gap: clamp(14px, 2.6vw, 34px);
  padding: 18px 20px;
  animation-delay: 1.35s;
}

.topnav a {
  font-size: 10.5px;
  font-weight: 400;
  letter-spacing: .26em;
  text-transform: uppercase;
  color: var(--ink-dim);
  transition: color .2s;
  padding-bottom: 2px;
}

.topnav a:hover { color: var(--brass); }

.foot {
  position: absolute;
  bottom: clamp(26px, 4.5vh, 44px);
  left: 0; right: 0;
  font-size: 10px;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: var(--ink-dim);
  animation-delay: 1.5s;
}

@media (max-width: 640px) {
  .topnav { gap: 12px; flex-wrap: wrap; padding: 14px 12px; }
  .topnav a { font-size: 9px; letter-spacing: .18em; }
}

@media (max-width: 480px) {
  .frame { inset: 10px; }
  .count div { min-width: 44px; }
}
</style>
</head>
<body>

<div class="glow" aria-hidden="true"></div>
<div class="frame" aria-hidden="true"></div>

<nav class="topnav fade" aria-label="Site pages">
  <a href="/our-story">Our Story</a>

  <a href="/travel">Travel</a>

<main class="page">
  <p class="eyebrow fade">Together with their families</p>

  <p class="fade" style="margin-top:6px;animation-delay:1.42s;">
    <a href="/lucie-and-simon-wedding.ics" style="font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-dim);border-bottom:1px solid var(--brass-line);padding-bottom:2px;">Apple Calendar</a>
    <span style="color:var(--brass-line);padding:0 10px;">·</span>
    <a href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Lucie+%26+Simon%27s+Wedding&dates=20270626T104500Z/20270627T000000Z&location=St+Mary%27s+Church,+Honley+HD9+6AH&details=Ceremony+12+noon,+St+Mary%27s+Church,+Honley.+Reception+from+1:30pm,+Manor+House,+Lindley.+https://lucieandsimon.wedding" target="_blank" rel="noopener" style="font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-dim);border-bottom:1px solid var(--brass-line);padding-bottom:2px;">Google Calendar</a>
  </p>

  <p class="foot fade">St Mary&rsquo;s Church &middot; Manor House Lindley</p>
</main>

<script>
(function(){
  var t = new Date('2027-06-26T12:00:00+01:00');

  // ── Wedding-day mode ──
  var now = new Date();
  var dayStart = new Date('2027-06-26T00:00:00+01:00');
  var dayEnd = new Date('2027-06-27T02:00:00+01:00');
  if (now >= dayStart && now < dayEnd) {
    var countEl = document.querySelector('.count');
    if (countEl) {
      countEl.outerHTML =
        '<div class="fade" style="margin:clamp(30px,5vh,52px) 0;animation-delay:1s;">' +
        '<p style="font-family:var(--serif);font-style:italic;font-size:clamp(28px,4.5vw,44px);color:var(--brass);">It&rsquo;s today.</p>' +
        '<div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:26px;">' +
        '<a href="/the-day" class="rsvp" style="animation:none;opacity:1;transform:none;">What&rsquo;s happening now</a>' +
        '<a href="/photos" class="rsvp" style="animation:none;opacity:1;transform:none;background:transparent;color:var(--ink);border:1px solid var(--ink);">Add your photos</a>' +
        '</div></div>';
      var rsvpBtn = document.querySelector('a.rsvp.fade');
      if (rsvpBtn) rsvpBtn.style.display = 'none';
      var ticker = document.getElementById('ticker');
      if (ticker) ticker.style.display = 'none';
    }
    return; // no countdown needed today
  }

  function tick(){
    var n = new Date(), diff = t - n;
    if (diff < 0) diff = 0;
    document.getElementById('d').textContent = Math.floor(diff/864e5);
    document.getElementById('h').textContent = Math.floor(diff%864e5/36e5);
    document.getElementById('m').textContent = Math.floor(diff%36e5/6e4);
  }
  tick(); setInterval(tick, 30000);

  // Live guest count
  fetch('https://uvvtdqltmdzbwchbtvbj.supabase.co/rest/v1/rpc/get_rsvp_count', {
    method: 'POST',
    headers: {
      'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2dnRkcWx0bWR6YndjaGJ0dmJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MTc1NDgsImV4cCI6MjA5MTk5MzU0OH0.qMHaphQXBRIZ2eZgyYFNEgRszRRM4V5jRSy3kPzLi5c',
      'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2dnRkcWx0bWR6YndjaGJ0dmJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MTc1NDgsImV4cCI6MjA5MTk5MzU0OH0.qMHaphQXBRIZ2eZgyYFNEgRszRRM4V5jRSy3kPzLi5c',
      'Content-Type': 'application/json'
    },
    body: '{}'
  }).then(function(r){ return r.json(); }).then(function(n){
    if (n >= 10) document.getElementById('ticker').textContent = n + ' guests are coming — join them';
  }).catch(function(){});
})();
</script>
